apiVersion: apps/v1
kind: Deployment
metadata:
  name: vrishabh-midterm-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vrishabh-midterm-app
  template:
    metadata:
      labels:
        app: vrishabh-midterm-app
    spec:
      containers:
      - name: vrishabh-midterm-app
        image: vb1405/vrishabh-midterm-cicd:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: vrishabh-midterm-service
spec:
  type: NodePort
  selector:
    app: vrishabh-midterm-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    nodePort: 30007
